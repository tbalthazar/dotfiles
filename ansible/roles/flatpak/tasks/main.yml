---
- name: Purge unwanted APT packages and their config files
  ansible.builtin.apt:
    name: "{{ apt_packages_to_remove }}"
    state: absent
    purge: yes
  when: apt_packages_to_remove | length > 0

- name: Ensure flatpak is installed
  ansible.builtin.apt:
    name: flatpak
    state: present
    update_cache: true

- name: Add Flathub remote if not exists
  ansible.builtin.command: >
    flatpak remote-add --if-not-exists {{ flatpak_flathub_name }} {{ flatpak_flathub_url }}
  register: flatpak_remote_result
  changed_when: "'already exists' not in flatpak_remote_result.stderr"

- name: Install Flatpak applications from Flathub
  become: false
  ansible.builtin.command: >
    flatpak install -y --noninteractive {{ flatpak_flathub_name }} {{ item }}
  loop: "{{ flatpak_packages }}"
  register: flatpak_install_result
  changed_when: "'Already installed' not in flatpak_install_result.stdout"
  failed_when: flatpak_install_result.rc != 0 and 'Already installed' not in flatpak_install_result.stdout

