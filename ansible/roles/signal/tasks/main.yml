---
- name: Ensure wget is installed
  ansible.builtin.apt:
    name: wget
    state: present
    update_cache: true

- name: Download and convert Signal GPG key
  ansible.builtin.shell: |
    wget -qO- {{ signal_key_url }} | gpg --dearmor > {{ signal_key_path }}
  args:
    creates: "{{ signal_key_path }}"

- name: Add Signal APT repository
  ansible.builtin.apt_repository:
    repo: "{{ signal_repo }}"
    filename: signal-xenial
    state: present

- name: Install Signal Desktop
  ansible.builtin.apt:
    name: signal-desktop
    state: present
    update_cache: true

